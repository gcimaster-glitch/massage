<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    
    <!-- キャッシュ無効化 + バージョン管理 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="version" content="2.0.1-admin-pages-fix" />
    
    <meta name="description" content="HOGUSY（ホグシー）は、あなたの「ほぐしてほしい」を叶えるセラピスト予約プラットフォーム。手軽に、心地よく、いつでもどこでもプロの施術を。" />
    <meta name="keywords" content="マッサージ,セラピスト,出張マッサージ,リラクゼーション,ほぐし,HOGUSY,ホグシー" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://hogusy.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hogusy.com" />
    <meta property="og:title" content="HOGUSY - ほぐす、を、もっと身近に。" />
    <meta property="og:description" content="HOGUSY（ホグシー）は、あなたの「ほぐしてほしい」を叶えるセラピスト予約プラットフォーム。" />
    <meta property="og:image" content="https://hogusy.com/og-image.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hogusy.com" />
    <meta property="twitter:title" content="HOGUSY - ほぐす、を、もっと身近に。" />
    <meta property="twitter:description" content="HOGUSY（ホグシー）は、あなたの「ほぐしてほしい」を叶えるセラピスト予約プラットフォーム。" />
    <meta property="twitter:image" content="https://hogusy.com/og-image.png" />
    
    <!-- PWA DISABLED -->
    <meta name="theme-color" content="#14b8a6" />
    
    <title>HOGUSY - ほぐす、を、もっと身近に。</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">
    <!-- Google Maps JavaScript API -->
    <!-- APIキーはVite環境変数 VITE_GOOGLE_MAPS_API_KEY から注入（ハードコード禁止） -->
    <script type="module">
      // ビルド時にViteがimport.meta.env.VITE_GOOGLE_MAPS_API_KEYを実際のキーに置換する
      const apiKey = import.meta.env.VITE_GOOGLE_MAPS_API_KEY;
      if (apiKey) {
        // Preconnect for faster loading
        const preconnect = document.createElement('link');
        preconnect.rel = 'preconnect';
        preconnect.href = 'https://maps.googleapis.com';
        document.head.appendChild(preconnect);
        // Google Maps APIスクリプトを動的に読み込む
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&libraries=places,geometry&language=ja&region=JP&loading=async`;
        script.async = true;
        script.defer = true;
        document.head.appendChild(script);
      }
    </script>
    <style>
      :root {
        --brand-teal: #14b8a6;
        --brand-indigo: #4338ca;
      }
      body {
        font-family: 'Noto Sans JP', 'Outfit', sans-serif;
        background-color: #ffffff;
        color: #111827;
        overflow-x: hidden;
      }
      .font-outfit { font-family: 'Outfit', sans-serif; }
      
      @keyframes slow-zoom {
        0% { transform: scale(1); }
        50% { transform: scale(1.1); }
        100% { transform: scale(1); }
      }
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fade-in-up 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Smooth transitions for interactive elements */
      button, a { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
      
      ::selection {
        background-color: #ccfbf1;
        color: #0f766e;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    
    <!-- Service Worker & PWA COMPLETELY DISABLED -->
    <script>
      // Force unregister all service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('🔴 Service Worker unregistered:', registration.scope);
          }
        });
      }
      
      // Disable PWA install prompt
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        return false;
      });
    </script>
  </body>
</html>

name: Check and Restore CF Environment Variables
on:
  workflow_dispatch:
  # デプロイ後に自動で環境変数を確認・復旧
  workflow_run:
    workflows: ["Deploy to Cloudflare Pages"]
    types:
      - completed

jobs:
  check-and-restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check and restore OAuth env vars
        run: |
          # 現在の環境変数を取得
          RESPONSE=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/hogusy" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json")

          # GOOGLE_CLIENT_IDが空か確認
          GOOGLE_ID=$(echo "$RESPONSE" | python3 -c "
import sys, json
data = json.load(sys.stdin)
env_vars = data.get('result', {}).get('deployment_configs', {}).get('production', {}).get('env_vars', {})
val = env_vars.get('GOOGLE_CLIENT_ID', {}).get('value', '')
print(val)
" 2>/dev/null || echo "")

          echo "GOOGLE_CLIENT_ID value length: ${#GOOGLE_ID}"

          if [ -z "$GOOGLE_ID" ]; then
            echo "⚠️  GOOGLE_CLIENT_ID is empty! Restoring from GitHub secrets..."
            curl -s -X PATCH \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/hogusy" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d '{
                "deployment_configs": {
                  "production": {
                    "env_vars": {
                      "GOOGLE_CLIENT_ID": {"value": "${{ secrets.GOOGLE_CLIENT_ID }}", "type": "secret_text"},
                      "GOOGLE_CLIENT_SECRET": {"value": "${{ secrets.GOOGLE_CLIENT_SECRET }}", "type": "secret_text"},
                      "LINE_CLIENT_ID": {"value": "${{ secrets.LINE_CLIENT_ID }}", "type": "secret_text"},
                      "LINE_CLIENT_SECRET": {"value": "${{ secrets.LINE_CLIENT_SECRET }}", "type": "secret_text"}
                    }
                  }
                }
              }' | python3 -c "import sys,json; d=json.load(sys.stdin); print('✅ Restored!' if d.get('success') else '❌ Failed: '+str(d.get('errors')))"
          else
            echo "✅ GOOGLE_CLIENT_ID is set correctly."
          fi

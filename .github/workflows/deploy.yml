name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    name: Deploy to Cloudflare Pages

    steps:
      # ① コードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # ② Node.js + pnpm のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # ③ 依存パッケージをインストール
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ④ ビルド（sync-functions.sh → SSRビルド → クライアントビルド → 404.htmlコピー）
      - name: Build
        run: pnpm build

      # ⑤ D1 データベースマイグレーション（booking_timelocks テーブル追加）
      - name: Run D1 Migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_ID: "97aee8a1-83d8-45e3-8a30-95ca6875e8ed" # hogusy-db-production (from wrangler.jsonc)
        run: |
          python3 scripts/run_d1_migration.py migrations/0045_add_booking_timelock.sql || echo "⚠️  D1 Migration failed (may already be applied), continuing..."

      # ⑥ Cloudflare Pages へデプロイ
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=hogusy --branch=main

      # ⑦ デプロイ完了通知
      - name: Notify deploy success
        if: success()
        run: echo "✅ Deploy to hogusy.com completed successfully!"

      - name: Notify deploy failure
        if: failure()
        run: echo "❌ Deploy failed. Check the logs above."

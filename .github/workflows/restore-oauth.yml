name: Restore OAuth Env Vars
on:
  workflow_dispatch:
jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Restore Google and LINE OAuth env vars to Cloudflare Pages
        run: |
          curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/hogusy" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"deployment_configs\":{\"production\":{\"env_vars\":{\"GOOGLE_CLIENT_ID\":{\"value\":\"${{ secrets.GOOGLE_CLIENT_ID }}\",\"type\":\"secret_text\"},\"GOOGLE_CLIENT_SECRET\":{\"value\":\"${{ secrets.GOOGLE_CLIENT_SECRET }}\",\"type\":\"secret_text\"},\"LINE_CLIENT_ID\":{\"value\":\"${{ secrets.LINE_CLIENT_ID }}\",\"type\":\"secret_text\"},\"LINE_CLIENT_SECRET\":{\"value\":\"${{ secrets.LINE_CLIENT_SECRET }}\",\"type\":\"secret_text\"}}}}}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('OK - env vars restored!' if d.get('success') else 'FAIL: '+str(d.get('errors')))"
